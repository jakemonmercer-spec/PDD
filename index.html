<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ПДД КР 2026 | Cloud Edition</title>
    
    <!-- Фикс для движка: должен быть самым первым -->
    <script>window._log = console.log;</script>

    <!-- Шрифты -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/index.css">
    
    <!-- Firebase SDK (Compat версии для лучшей поддержки браузеров) -->
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <style>
        /* Критически важные стили для экрана входа, чтобы он не "разваливался" как на фото */
        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0f172a; display: flex; align-items: center; justify-content: center;
            z-index: 1000000; padding: 20px; font-family: 'Montserrat', sans-serif;
        }
        .auth-card {
            background: #1e293b; padding: 35px; border-radius: 28px;
            width: 100%; max-width: 400px; text-align: center;
            border: 1px solid #334155; box-shadow: 0 25px 60px rgba(0,0,0,0.6);
        }
        .auth-card h2 { color: #38bdf8; font-weight: 900; margin-bottom: 25px; letter-spacing: 1px; }
        .auth-input {
            width: 100%; padding: 16px; margin: 12px 0; background: #0f172a;
            border: 1px solid #334155; border-radius: 14px; color: #fff; font-size: 16px;
            font-family: inherit; transition: 0.3s;
        }
        .auth-input:focus { border-color: #38bdf8; }
        .btn-primary-auth {
            width: 100%; padding: 18px; background: #38bdf8; color: #0f172a;
            border: none; border-radius: 14px; font-weight: 900; font-size: 1rem;
            cursor: pointer; margin-top: 15px; transition: 0.2s;
        }
        .btn-google-auth {
            width: 100%; padding: 14px; background: #fff; color: #000;
            border-radius: 14px; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            margin-bottom: 20px; border: none; font-size: 14px;
        }
        #main-app-wrapper { display: none; flex-direction: column; height: 100dvh; width: 100%; background: #0f172a; }
        
        /* Стили для кастомной шапки */
        .app-header {
            flex-shrink: 0; height: 60px; background: #1e293b;
            border-bottom: 1px solid #334155; display: flex;
            justify-content: space-between; align-items: center; padding: 0 15px;
            z-index: 1000; position: sticky; top: 0;
        }
        .btn-header {
            background: #334155; border: none; padding: 10px 18px;
            border-radius: 12px; font-size: 12px; font-weight: 800; color: #fff;
            text-decoration: none; cursor: pointer; text-transform: uppercase;
        }
        .btn-header.home { background: #38bdf8; color: #0f172a; }
    </style>
</head>
<body>

    <!-- 1. ЭКРАН ВХОДА (Всегда сверху до авторизации) -->
    <div id="auth-overlay">
        <div class="auth-card">
            <h2>ПДД КР 2026</h2>
            <button class="btn-google-auth" onclick="handleGoogleAuth()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
                ВОЙТИ ЧЕРЕЗ GOOGLE
            </button>
            <div style="margin:15px 0; color:#475569; font-size:11px; font-weight:800; letter-spacing:1px;">ИЛИ ЧЕРЕЗ ПОЧТУ</div>
            <input type="email" id="auth-email" class="auth-input" placeholder="Email">
            <input type="password" id="auth-pass" class="auth-input" placeholder="Пароль">
            <button class="btn-primary-auth" onclick="handleEmailAuth()">ВОЙТИ / СОЗДАТЬ</button>
            <p id="auth-error" style="color:#f43f5e; font-size:11px; margin-top:15px; font-weight:600;"></p>
        </div>
    </div>

    <!-- 2. ОСНОВНОЕ ПРИЛОЖЕНИЕ -->
    <div id="main-app-wrapper">
        <header class="app-header">
            <div style="display:flex; gap:10px;">
                <a href="#/debug" class="btn-header home">МЕНЮ</a>
                <button class="btn-header" onclick="logout()">ВЫХОД</button>
            </div>
            <div id="user-display-name" style="color:#94a3b8; font-size:10px; font-weight:700; text-transform:uppercase;"></div>
            <div id="timer-display" style="font-weight:900; color:#38bdf8; font-size:18px;">25:00</div>
        </header>
        <main id="app"></main>
    </div>

    <script type="module">
        import { initCloudApp } from './assets/cloud-logic.js';

        // Ключи Firebase
        const firebaseConfig = {
          apiKey: "AIzaSyCWpx351vaBx5dtNubE2EKI3LHdhO-NDCs",
          authDomain: "pdd-kg-local.firebaseapp.com",
          databaseURL: "https://pdd-kg-local-default-rtdb.firebaseio.com",
          projectId: "pdd-kg-local",
          storageBucket: "pdd-kg-local.firebasestorage.app",
          messagingSenderId: "975775800028",
          appId: "1:975775800028:web:9b036c419cc4d1f082b219"
        };

        // Инициализация
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        window.auth = firebase.auth();
        window.db = firebase.database();

        // Глобальные функции авторизации
        window.handleEmailAuth = async () => {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            const errBox = document.getElementById('auth-error');
            if(!email || !pass) return;
            try {
                await window.auth.signInWithEmailAndPassword(email, pass);
            } catch (e) {
                if (e.code.includes('not-found') || e.code.includes('wrong-password')) {
                    try { await window.auth.createUserWithEmailAndPassword(email, pass); }
                    catch (regErr) { errBox.innerText = regErr.message; }
                } else { errBox.innerText = e.message; }
            }
        };

        window.handleGoogleAuth = () => window.auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
        window.logout = () => { if(confirm("Выйти?")) window.auth.signOut().then(() => location.reload()); };

        // Слушатель состояния входа
        window.auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('main-app-wrapper').style.display = 'flex';
                document.getElementById('user-display-name').innerText = user.email.split('@')[0];
                
                if (!window.location.hash || window.location.hash === '#/') {
                    window.location.hash = '#/debug';
                }

                // Запуск облачной логики из cloud-logic.js
                initCloudApp(user.uid);
                
                // Запуск "Чистильщика" интерфейса
                startSurgeonMode();
            } else {
                document.getElementById('auth-overlay').style.display = 'flex';
                document.getElementById('main-app-wrapper').style.display = 'none';
            }
        });

        // Функция "Хирург" для исправления багов движка на лету
        function startSurgeonMode() {
            const observer = new MutationObserver(() => {
                // 1. Фикс пагинации (цифры внизу)
                document.querySelectorAll('ul#componentContainer li').forEach(li => {
                    const btn = li.querySelector('.pagination-item');
                    if (btn) {
                        if (li.classList.contains('valid')) btn.setAttribute('data-state', 'correct');
                        else if (li.classList.contains('invalid')) btn.setAttribute('data-state', 'wrong');
                    }
                });

                // 2. Фикс результата (строка 1300:44)
                const resValues = document.querySelector('.values-group');
                if (resValues && !resValues.querySelector('.res-card')) {
                    const raw = resValues.innerText.trim();
                    const parts = raw.match(/(\d+)(\d+)(\d{2}:\d{2})/);
                    if (parts) {
                        resValues.innerHTML = `
                            <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; width:100%;">
                                <div class="res-card" style="background:#1e293b; padding:15px; border-radius:12px; text-align:center;">
                                    <div style="font-size:9px; opacity:0.6; text-transform:uppercase;">Верно</div>
                                    <div style="font-size:22px; font-weight:900; color:#10b981;">${parts[1]}</div>
                                </div>
                                <div class="res-card" style="background:#1e293b; padding:15px; border-radius:12px; text-align:center;">
                                    <div style="font-size:9px; opacity:0.6; text-transform:uppercase;">Ошибки</div>
                                    <div style="font-size:22px; font-weight:900; color:#f43f5e;">${parts[2]}</div>
                                </div>
                                <div class="res-card" style="background:#1e293b; padding:15px; border-radius:12px; text-align:center;">
                                    <div style="font-size:9px; opacity:0.6; text-transform:uppercase;">Время</div>
                                    <div style="font-size:22px; font-weight:900; color:#38bdf8;">${parts[3]}</div>
                                </div>
                            </div>
                        `;
                    }
                }
            });
            observer.observe(document.getElementById('app'), { childList: true, subtree: true });
        }
    </script>

    <!-- Главный движок сайта -->
    <script type="module" src="./assets/index.js"></script>
</body>
</html>
