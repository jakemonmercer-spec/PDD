<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ПДД КР | Универсальная тема</title>
    <link rel="stylesheet" href="./assets/index.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <style>
        /* Переменные мягкой темы */
        :root {
            --bg: #0f172a;           /* Глубокий сине-черный */
            --surface: #1e293b;      /* Цвет карточек */
            --primary: #38bdf8;      /* Мягкий голубой */
            --text: #f1f5f9;         /* Почти белый текст */
            --text-muted: #94a3b8;   /* Приглушенный текст */
            --border: #334155;       /* Цвет границ */
            --success: #10b981;      /* Изумрудный */
            --danger: #f43f5e;       /* Розово-красный */
        }

        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); display: flex; align-items: center; justify-content: center;
            z-index: 10000; padding: 20px;
        }
        .auth-card {
            background: var(--surface); padding: 30px; border-radius: 24px;
            width: 100%; max-width: 360px; text-align: center;
            border: 1px solid var(--border);
        }
        .auth-input {
            width: 100%; padding: 14px; margin: 10px 0; background: var(--bg);
            border: 1px solid var(--border); border-radius: 12px; color: #fff; font-size: 16px;
        }
        .btn-primary {
            width: 100%; padding: 16px; background: var(--primary); color: var(--bg);
            border: none; border-radius: 12px; font-weight: 800; cursor: pointer;
        }
        .btn-google {
            width: 100%; padding: 12px; background: #fff; color: #000;
            border-radius: 12px; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 15px;
        }

        #main-app-wrapper { 
            display: none; 
            flex-direction: column;
            height: 100dvh;
            width: 100%;
            background: var(--bg);
        }

        .top-bar {
            flex-shrink: 0; height: 60px; background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 15px; z-index: 1000;
        }

        .btn-nav {
            background: var(--border); border: none; padding: 8px 14px;
            border-radius: 10px; font-size: 12px; font-weight: 700; color: var(--text);
            text-decoration: none;
        }
        .btn-nav.accent { background: var(--primary); color: var(--bg); }

        #app {
            flex-grow: 1; overflow-y: auto; padding: 15px;
            width: 100%; max-width: 500px; margin: 0 auto;
        }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-card">
            <h2 style="margin-bottom:20px; color: var(--primary);">ПДД КР 2026</h2>
            <button class="btn-google" onclick="handleGoogleAuth()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">
                Вход через Google
            </button>
            <input type="email" id="auth-email" class="auth-input" placeholder="Email">
            <input type="password" id="auth-pass" class="auth-input" placeholder="Пароль">
            <button class="btn-primary" onclick="handleEmailAuth()">Войти</button>
            <p id="auth-error" style="color:var(--danger); font-size:11px; margin-top:10px;"></p>
        </div>
    </div>

    <div id="main-app-wrapper">
        <header class="top-bar">
            <div style="display:flex; gap:8px;">
                <a href="#/debug" class="btn-nav accent">МЕНЮ</a>
                <button class="btn-nav" onclick="logout()">ВЫХОД</button>
            </div>
            <div id="timer-display" style="font-weight:900; color:var(--primary); font-size:16px;">25:00</div>
        </header>
        <main id="app"></main>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyCWpx351vaBx5dtNubE2EKI3LHdhO-NDCs",
          authDomain: "pdd-kg-local.firebaseapp.com",
          databaseURL: "https://pdd-kg-local-default-rtdb.firebaseio.com",
          projectId: "pdd-kg-local",
          storageBucket: "pdd-kg-local.firebasestorage.app",
          messagingSenderId: "975775800028",
          appId: "1:975775800028:web:9b036c419cc4d1f082b219"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        window._log = console.log;

        // Хеш для ID вопроса (фикс ошибки 768 байт)
        function generateId(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = ((hash << 5) - hash) + str.charCodeAt(i);
                hash |= 0;
            }
            return 'q' + Math.abs(hash);
        }

        async function handleEmailAuth() {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            try { await auth.signInWithEmailAndPassword(email, pass); } 
            catch (e) { if (e.code === 'auth/user-not-found') await auth.createUserWithEmailAndPassword(email, pass); }
        }

        async function handleGoogleAuth() {
            try { await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); } catch(e) {}
        }

        function logout() { auth.signOut().then(() => location.reload()); }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('main-app-wrapper').style.display = 'flex';
                if (!window.location.hash || window.location.hash === '#/') window.location.hash = '#/debug';
                runEngineFixes(user.uid);
            } else {
                document.getElementById('auth-overlay').style.display = 'flex';
                document.getElementById('main-app-wrapper').style.display = 'none';
            }
        });

        function runEngineFixes(uid) {
            const observer = new MutationObserver(() => {
                // 1. Фикс окрашивания цифр внизу
                document.querySelectorAll('ul#componentContainer li').forEach(li => {
                    const btn = li.querySelector('.pagination-item');
                    if (btn) {
                        if (li.className.includes('valid')) btn.classList.add('is-correct');
                        if (li.className.includes('invalid')) btn.classList.add('is-wrong');
                    }
                });

                // 2. Ловим ошибки для сохранения
                const wrongAnswer = document.querySelector('.question-item.invalid');
                if (wrongAnswer) {
                    const qText = document.querySelector('.question-title')?.innerText;
                    if (qText) {
                        const qId = generateId(qText);
                        db.ref(`users/${uid}/errors/${qId}`).set({ title: qText, date: new Date().toLocaleString() });
                    }
                }
            });

            observer.observe(document.getElementById('app'), { childList: true, subtree: true, attributes: true });

            document.addEventListener('click', (e) => {
                if (e.target.innerText && e.target.innerText.includes('Мои ошибки')) {
                    e.preventDefault();
                    showCloudMistakes(uid);
                }
            });
        }

        async function showCloudMistakes(uid) {
            const app = document.querySelector('#app');
            app.innerHTML = '<div style="color:var(--primary); text-align:center; padding:50px;">Загрузка ошибок...</div>';
            const snap = await db.ref(`users/${uid}/errors`).once('value');
            const data = snap.val();
            if (!data) {
                app.innerHTML = '<div style="text-align:center; padding:50px;">Ошибок нет!<br><br><button class="btn-primary" onclick="location.reload()">Назад</button></div>';
                return;
            }
            let list = '';
            Object.values(data).forEach(err => {
                list += `<div class="question-item" style="margin-bottom:10px; border:1px solid var(--border); padding:15px; border-radius:14px; background:var(--surface); text-align:left;">${err.title}</div>`;
            });
            app.innerHTML = `<div><h2 style="text-align:center; margin-bottom:20px; color:var(--primary);">МОИ ОШИБКИ</h2>${list}<button class="btn-primary" onclick="location.reload()" style="margin-top:20px;">В МЕНЮ</button></div>`;
        }
    </script>
    <script type="module" src="./assets/index.js"></script>
</body>
</html>
