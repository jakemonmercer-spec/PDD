<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ПДД КР 2026 | Cloud Edition</title>
    
    <!-- 1. ГЛОБАЛЬНЫЙ ФИКС ЛОГОВ (Для index.js) -->
    <script>window._log = console.log;</script>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/index.css">
    
    <!-- 2. БИБЛИОТЕКИ FIREBASE (Compat версии для стабильности) -->
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <!-- 3. ИНИЦИАЛИЗАЦИЯ И ГЛОБАЛЬНЫЕ ФУНКЦИИ -->
    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyCWpx351vaBx5dtNubE2EKI3LHdhO-NDCs",
          authDomain: "pdd-kg-local.firebaseapp.com",
          databaseURL: "https://pdd-kg-local-default-rtdb.firebaseio.com",
          projectId: "pdd-kg-local",
          storageBucket: "pdd-kg-local.firebasestorage.app",
          messagingSenderId: "975775800028",
          appId: "1:975775800028:web:9b036c419cc4d1f082b219"
        };

        // Инициализация Firebase немедленно при загрузке страницы
        firebase.initializeApp(firebaseConfig);
        window.auth = firebase.auth();
        window.db = firebase.database();

        // Функции входа делаем глобальными для кнопок
        window.handleGoogleAuth = async () => {
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                await window.auth.signInWithPopup(provider);
            } catch (e) {
                document.getElementById('auth-error').innerText = e.message;
            }
        };

        window.handleEmailAuth = async () => {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            const errBox = document.getElementById('auth-error');
            if(!email || !pass) return;
            try {
                await window.auth.signInWithEmailAndPassword(email, pass);
            } catch (e) {
                // Если юзер не найден, создаем новый аккаунт автоматически
                window.auth.createUserWithEmailAndPassword(email, pass).catch(e2 => {
                    errBox.innerText = e2.message;
                });
            }
        };

        window.logout = () => {
            if(confirm("Выйти из аккаунта?")) window.auth.signOut().then(() => location.reload());
        };
    </script>

    <style>
        /* Встроенные стили для экрана входа (защита от "развала" верстки) */
        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0f172a; display: flex; align-items: center; justify-content: center;
            z-index: 1000000; padding: 20px;
        }
        .auth-card {
            background: #1e293b; padding: clamp(20px, 5vw, 35px); border-radius: 28px;
            width: 100%; max-width: 400px; text-align: center; border: 1px solid #334155;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
        }
        .auth-input {
            width: 100%; padding: 16px; margin: 10px 0; background: #0f172a;
            border: 1px solid #334155; border-radius: 14px; color: #fff; font-family: 'Montserrat', sans-serif;
        }
        #main-app-wrapper { display: none; width: 100%; height: 100dvh; flex-direction: column; background: #0f172a; }
    </style>
</head>
<body>

    <!-- 1. ЭКРАН ВХОДА -->
    <div id="auth-overlay">
        <div class="auth-card">
            <h2 style="color:#38bdf8; font-weight:900; margin-bottom:20px;">ПДД КР 2026</h2>
            <button class="test-mode-link" style="background:#fff!important; color:#000!important; width:100%; margin-bottom:15px; border-radius:12px; font-weight:700; padding:12px; border:none; cursor:pointer;" onclick="handleGoogleAuth()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" style="vertical-align:middle; margin-right:10px;"> ВОЙТИ ЧЕРЕЗ GOOGLE
            </button>
            <div style="margin:10px; color:#475569; font-size:10px; font-weight:800;">ИЛИ ПОЧТА</div>
            <input type="email" id="auth-email" class="auth-input" placeholder="Email">
            <input type="password" id="auth-pass" class="auth-input" placeholder="Пароль">
            <button class="test-mode-link" style="width:100%; padding:16px; background:#38bdf8!important; color:#0f172a!important; border:none; border-radius:12px; font-weight:900; cursor:pointer;" onclick="handleEmailAuth()">ВОЙТИ / СОЗДАТЬ</button>
            <p id="auth-error" style="color:#f43f5e; font-size:11px; margin-top:15px;"></p>
        </div>
    </div>

    <!-- 2. ИНТЕРФЕЙС ПРИЛОЖЕНИЯ -->
    <div id="main-app-wrapper">
        <header class="app-header" style="height:60px; background:rgba(30,41,59,0.9); display:flex; justify-content:space-between; align-items:center; padding:0 15px; border-bottom:1px solid #334155; position:sticky; top:0; z-index:1000; backdrop-filter: blur(10px);">
            <div style="display:flex; gap:8px;">
                <a href="#/debug" style="background:#ffcc00; color:#000; padding:8px 15px; border-radius:8px; font-weight:800; text-decoration:none; font-size:12px;">МЕНЮ</a>
                <button onclick="logout()" style="background:#e21b3c; color:#fff; border:none; padding:8px 15px; border-radius:8px; font-weight:800; font-size:12px; cursor:pointer;">ВЫХОД</button>
            </div>
            <div id="user-tag" style="color:#94a3b8; font-size:10px; font-weight:800; text-transform:uppercase;"></div>
            <div id="timer-display" style="color:#38bdf8; font-weight:900; font-size:18px;">25:00</div>
        </header>
        <main id="app"></main>
    </div>

    <!-- 4. ЛОГИКА СОГЛАСОВАНИЯ И ХИРУРГ ИНТЕРФЕЙСА -->
    <script type="module">
        import { initCloudApp } from './assets/cloud-logic.js';

        // Ждем авторизацию
        window.auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('main-app-wrapper').style.display = 'flex';
                document.getElementById('user-tag').innerText = user.email.split('@')[0];
                
                if (!window.location.hash || window.location.hash === '#/') {
                    window.location.hash = '#/debug';
                }

                // Запуск логики сохранения ошибок
                initCloudApp(user.uid);
                
                // Запуск "Хирурга" интерфейса
                startGlobalSurgeon();
            } else {
                document.getElementById('auth-overlay').style.display = 'flex';
                document.getElementById('main-app-wrapper').style.display = 'none';
            }
        });

        function startGlobalSurgeon() {
            setInterval(() => {
                // А. Красим цифры внизу (пагинация)
                document.querySelectorAll('ul#componentContainer li').forEach(li => {
                    const btn = li.querySelector('.pagination-item');
                    if (btn) {
                        if (li.classList.contains('valid')) btn.setAttribute('data-res', 'bright');
                        else if (li.classList.contains('invalid')) btn.setAttribute('data-res', 'dark');
                        else btn.setAttribute('data-res', 'normal');
                    }
                });

                // Б. Фикс результатов (51500:41)
                const resValues = document.querySelector('.values-group');
                if (resValues && !resValues.querySelector('.surgeon-res')) {
                    const raw = resValues.innerText.replace(/\s/g, '');
                    const parts = raw.match(/(\d+)(\d{1,2})(\d{2}:\d{2})/);
                    if (parts) {
                        resValues.innerHTML = `
                            <div class="surgeon-res" style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; width:100%;">
                                <div style="background:#1e293b; padding:12px; border-radius:12px; text-align:center; border:1px solid #334155;">
                                    <div style="font-size:8px; opacity:0.5; text-transform:uppercase;">Верно</div>
                                    <div style="font-size:20px; font-weight:900; color:#10b981;">${parts[1]}</div>
                                </div>
                                <div style="background:#1e293b; padding:12px; border-radius:12px; text-align:center; border:1px solid #334155;">
                                    <div style="font-size:8px; opacity:0.5; text-transform:uppercase;">Ошибки</div>
                                    <div style="font-size:20px; font-weight:900; color:#f43f5e;">${parts[2]}</div>
                                </div>
                                <div style="background:#1e293b; padding:12px; border-radius:12px; text-align:center; border:1px solid #334155;">
                                    <div style="font-size:8px; opacity:0.5; text-transform:uppercase;">Время</div>
                                    <div style="font-size:20px; font-weight:900; color:#38bdf8;">${parts[3]}</div>
                                </div>
                            </div>
                        `;
                    }
                }
            }, 400);
        }
    </script>

    <!-- 5. ДВИЖОК ОРИГИНАЛЬНОГО САЙТА -->
    <script type="module" src="./assets/index.js"></script>
</body>
</html>
