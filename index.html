<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ПДД КР | Тестирование</title>
    <link rel="stylesheet" href="./assets/index.css">
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <style>
        /* Стили окна входа - лаконично */
        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #f8fafc; display: flex; align-items: center; justify-content: center;
            z-index: 10000; padding: 20px;
        }
        .auth-card {
            background: white; padding: 25px; border-radius: 16px;
            width: 100%; max-width: 360px; text-align: center;
            border: 1px solid #e2e8f0;
        }
        .auth-card h2 { margin-bottom: 20px; color: #1e293b; font-size: 1.4rem; }
        .auth-input {
            width: 100%; padding: 14px; margin: 8px 0;
            border: 1px solid #cbd5e1; border-radius: 10px; font-size: 1rem;
        }
        .btn-auth-primary {
            width: 100%; padding: 14px; background: #2563eb; color: white;
            border: none; border-radius: 10px; font-weight: 700; cursor: pointer;
        }
        .btn-google {
            width: 100%; padding: 12px; background: white; border: 1px solid #e2e8f0;
            border-radius: 10px; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 15px;
        }
        #main-app-wrapper { display: none; width: 100%; }
        
        /* Компактная шапка */
        .top-bar {
            position: sticky; top: 0; width: 100%; height: 50px;
            background: #fff; border-bottom: 1px solid #e2e8f0;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 15px; z-index: 999;
        }
        .btn-minimal {
            background: #f1f5f9; color: #475569; border: none;
            padding: 6px 12px; border-radius: 8px; font-weight: 600; font-size: 12px;
            text-decoration: none; cursor: pointer;
        }
        .btn-minimal.home { background: #2563eb; color: white; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-card">
            <h2>ПДД КР</h2>
            <button class="btn-google" onclick="handleGoogleAuth()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">
                Google Вход
            </button>
            <input type="email" id="auth-email" class="auth-input" placeholder="Email">
            <input type="password" id="auth-pass" class="auth-input" placeholder="Пароль">
            <button class="btn-auth-primary" onclick="handleEmailAuth()">Войти / Регистрация</button>
            <p id="auth-error" style="color:red; font-size:11px; mt:10px;"></p>
        </div>
    </div>

    <div id="main-app-wrapper">
        <header class="top-bar">
            <div style="display:flex; gap:8px;">
                <a href="#/debug" class="btn-minimal home">МЕНЮ</a>
                <button class="btn-minimal" onclick="logout()">ВЫХОД</button>
            </div>
            <div id="timer-display" style="font-weight: 700; font-size: 14px; color: #2563eb;">25:00</div>
        </header>
        <main id="app"></main>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyCWpx351vaBx5dtNubE2EKI3LHdhO-NDCs",
          authDomain: "pdd-kg-local.firebaseapp.com",
          databaseURL: "https://pdd-kg-local-default-rtdb.firebaseio.com",
          projectId: "pdd-kg-local",
          storageBucket: "pdd-kg-local.firebasestorage.app",
          messagingSenderId: "975775800028",
          appId: "1:975775800028:web:9b036c419cc4d1f082b219"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        window._log = console.log;

        async function handleEmailAuth() {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            try { await auth.signInWithEmailAndPassword(email, pass); } 
            catch (e) { if (e.code === 'auth/user-not-found') await auth.createUserWithEmailAndPassword(email, pass); }
        }

        async function handleGoogleAuth() {
            const provider = new firebase.auth.GoogleAuthProvider();
            await auth.signInWithPopup(provider);
        }

        function logout() { auth.signOut().then(() => location.reload()); }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('main-app-wrapper').style.display = 'block';
                if (!window.location.hash || window.location.hash === '#/') window.location.hash = '#/debug';
                initTracker(user.uid);
            } else {
                document.getElementById('auth-overlay').style.display = 'flex';
                document.getElementById('main-app-wrapper').style.display = 'none';
            }
        });

        function initTracker(uid) {
            const observer = new MutationObserver(() => {
                const wrong = document.querySelector('.question-item.invalid');
                if (wrong) {
                    const qText = document.querySelector('.question-title')?.innerText;
                    if (qText) {
                        const id = btoa(encodeURIComponent(qText)).replace(/[/+=]/g, "X");
                        db.ref(`users/${uid}/errors/${id}`).set({ title: qText, date: new Date().toLocaleString() });
                    }
                }
            });
            observer.observe(document.getElementById('app'), { childList: true, subtree: true });

            document.addEventListener('click', (e) => {
                if (e.target.innerText && e.target.innerText.includes('Мои ошибки')) {
                    e.preventDefault();
                    showMistakes(uid);
                }
            });
        }

        async function showMistakes(uid) {
            const app = document.querySelector('#app');
            app.innerHTML = '<div style="padding:40px; text-align:center;">Загрузка...</div>';
            const snap = await db.ref(`users/${uid}/errors`).once('value');
            const data = snap.val();
            if (!data) {
                app.innerHTML = '<div style="padding:40px; text-align:center;">Ошибок нет! <br><br><button class="btn-auth-primary" onclick="location.reload()">Назад</button></div>';
                return;
            }
            let cards = '';
            Object.values(data).forEach(err => {
                cards += `<div class="question-item" style="font-size:13px; margin-bottom:10px; border:1px solid #e2e8f0; padding:15px; border-radius:10px; background:#f8fafc;">${err.title}</div>`;
            });
            app.innerHTML = `<div style="padding:15px;"><h2 style="text-align:center; margin-bottom:15px;">ВАШИ ОШИБКИ</h2>${cards}<button class="btn-auth-primary" onclick="location.reload()" style="margin-top:20px;">В МЕНЮ</button></div>`;
        }
    </script>
    <script type="module" src="./assets/index.js"></script>
</body>
</html>
