<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ПДД КР 2026 | Cloud Edition</title>
    <link rel="stylesheet" href="./assets/index.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <style>
        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #46178f; display: flex; align-items: center; justify-content: center;
            z-index: 10000; padding: 20px;
        }
        .auth-card {
            background: white; padding: 30px; border-radius: 24px;
            width: 100%; max-width: 400px; text-align: center;
        }
        .auth-input {
            width: 100%; padding: 16px; margin: 10px 0;
            border: 2px solid #f1f5f9; border-radius: 14px; font-family: 'Montserrat';
        }
        .btn-auth-primary {
            width: 100%; padding: 18px; background: #ffcc00; border: none;
            border-radius: 14px; font-weight: 900; cursor: pointer;
        }
        #main-app-wrapper { display: none; width: 100%; }
        .user-pill { opacity: 0.7; font-size: 10px; font-weight: 800; color: white; }
    </style>
</head>
<body>

    <!-- ОКНО ВХОДА -->
    <div id="auth-overlay">
        <div class="auth-card">
            <h2 style="color:#46178f; font-weight:900; margin-bottom:20px;">ПДД КР 2026</h2>
            <button class="test-mode-link" style="background:#f1f5f9!important;" onclick="handleGoogleAuth()">ВОЙТИ ЧЕРЕЗ GOOGLE</button>
            <div style="margin:15px; color:#ccc; font-size:10px;">ИЛИ ПОЧТА</div>
            <input type="email" id="auth-email" class="auth-input" placeholder="Email">
            <input type="password" id="auth-pass" class="auth-input" placeholder="Пароль">
            <button class="btn-auth-primary" onclick="handleEmailAuth()">ВОЙТИ / СОЗДАТЬ</button>
            <p id="auth-error" style="color:red; font-size:10px; margin-top:10px;"></p>
        </div>
    </div>

    <!-- ОСНОВНОЕ ПРИЛОЖЕНИЕ -->
    <div id="main-app-wrapper">
        <nav class="game-nav">
            <div style="display:flex; gap:10px;">
                <a href="#/debug" class="btn-exit" style="background:#ffcc00!important; color:#000!important; box-shadow:0 4px 0 #b38f00!important;">МЕНЮ</a>
                <button class="btn-exit" onclick="logout()">ВЫХОД</button>
            </div>
            <div class="user-pill" id="user-label"></div>
            <div id="timer-display" class="header-time">25:00</div>
        </nav>
        <main id="app"></main>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyCWpx351vaBx5dtNubE2EKI3LHdhO-NDCs",
          authDomain: "pdd-kg-local.firebaseapp.com",
          databaseURL: "https://pdd-kg-local-default-rtdb.firebaseio.com",
          projectId: "pdd-kg-local",
          storageBucket: "pdd-kg-local.firebasestorage.app",
          messagingSenderId: "975775800028",
          appId: "1:975775800028:web:9b036c419cc4d1f082b219"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        window._log = console.log;

        async function handleEmailAuth() {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            try {
                await auth.signInWithEmailAndPassword(email, pass);
            } catch (e) {
                if (e.code === 'auth/user-not-found') await auth.createUserWithEmailAndPassword(email, pass);
                else document.getElementById('auth-error').innerText = e.message;
            }
        }

        async function handleGoogleAuth() {
            const provider = new firebase.auth.GoogleAuthProvider();
            await auth.signInWithPopup(provider).catch(e => console.log(e));
        }

        function logout() { auth.signOut().then(() => location.reload()); }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('main-app-wrapper').style.display = 'block';
                document.getElementById('user-label').innerText = user.email.split('@')[0];
                if (!window.location.hash || window.location.hash === '#/') window.location.hash = '#/debug';
                initTracker(user.uid);
            } else {
                document.getElementById('auth-overlay').style.display = 'flex';
                document.getElementById('main-app-wrapper').style.display = 'none';
            }
        });

        function initTracker(uid) {
            document.addEventListener('click', (e) => {
                // Если нажали "ОТВЕТИТЬ"
                if (e.target.closest('.answer-btn')) {
                    setTimeout(() => {
                        const isWrong = document.querySelector('.question-item.invalid');
                        if (isWrong) {
                            const qText = document.querySelector('.question-title')?.innerText;
                            if (qText) {
                                const id = btoa(encodeURIComponent(qText)).replace(/[/+=]/g, "X");
                                db.ref(`users/${uid}/errors/${id}`).set({ title: qText, date: new Date().toLocaleString() });
                                console.log("ОШИБКА СОХРАНЕНА");
                            }
                        }
                    }, 600);
                }

                // Кнопка "Мои ошибки"
                if (e.target.innerText && e.target.innerText.includes('Мои ошибки')) {
                    e.preventDefault();
                    renderMistakes(uid);
                }
            });
        }

        async function renderMistakes(uid) {
            const app = document.querySelector('#app');
            app.innerHTML = '<h2 class="title_main2">ЗАГРУЗКА...</h2>';
            const snap = await db.ref(`users/${uid}/errors`).once('value');
            const data = snap.val();

            if (!data) {
                app.innerHTML = '<div class="div_welcome_page"><h2 class="title_main2">ОШИБОК НЕТ!</h2><button class="button_main" onclick="location.reload()">В МЕНЮ</button></div>';
                return;
            }

            let cards = '';
            Object.values(data).forEach(err => {
                cards += `<div class="question-item" style="background:var(--glass)!important; color:white!important; font-size:12px; margin-bottom:10px; border-radius:12px; padding:15px; text-align:left;">${err.title}</div>`;
            });

            app.innerHTML = `
                <div class="div_welcome_page" style="padding-top:10px;">
                    <h2 class="title_main2">МОИ ОШИБКИ (${Object.keys(data).length})</h2>
                    <div class="question-content" style="width:100%; overflow-y:auto; max-height:65vh; scrollbar-width:none;">${cards}</div>
                    <button class="button_main" onclick="location.reload()" style="position:static; margin-top:20px;">В МЕНЮ</button>
                </div>`;
        }
    </script>
    <script type="module" src="./assets/index.js"></script>
</body>
</html>
