<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ПДД КР 2026 | Cloud Edition</title>
    
    <!-- 1. ГЛОБАЛЬНЫЙ ФИКС ДЛЯ ДВИЖКА (Выполняется мгновенно) -->
    <script>window._log = console.log;</script>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/index.css">
    
    <!-- 2. БИБЛИОТЕКИ FIREBASE -->
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <!-- 3. ИНИЦИАЛИЗАЦИЯ FIREBASE И ГЛОБАЛЬНЫЕ ФУНКЦИИ -->
    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyCWpx351vaBx5dtNubE2EKI3LHdhO-NDCs",
          authDomain: "pdd-kg-local.firebaseapp.com",
          databaseURL: "https://pdd-kg-local-default-rtdb.firebaseio.com",
          projectId: "pdd-kg-local",
          storageBucket: "pdd-kg-local.firebasestorage.app",
          messagingSenderId: "975775800028",
          appId: "1:975775800028:web:9b036c419cc4d1f082b219"
        };

        // Инициализируем Firebase сразу для всех скриптов
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        window.auth = firebase.auth();
        window.db = firebase.database();

        // Глобальные обработчики для кнопок
        window.handleGoogleAuth = () => {
            const provider = new firebase.auth.GoogleAuthProvider();
            window.auth.signInWithPopup(provider).catch(e => {
                document.getElementById('auth-error').innerText = e.message;
            });
        };

        window.handleEmailAuth = () => {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            if(!email || !pass) return;
            window.auth.signInWithEmailAndPassword(email, pass).catch(e => {
                window.auth.createUserWithEmailAndPassword(email, pass).catch(e2 => {
                    document.getElementById('auth-error').innerText = e2.message;
                });
            });
        };

        window.logout = () => {
            if(confirm("Выйти из аккаунта?")) window.auth.signOut().then(() => location.reload());
        };
    </script>

    <style>
        /* Критически важные стили для экрана входа, чтобы не было "дичи" до загрузки CSS */
        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0f172a; display: flex; align-items: center; justify-content: center;
            z-index: 1000000; padding: 20px; font-family: 'Montserrat', sans-serif;
        }
        .auth-card {
            background: #1e293b; padding: 35px; border-radius: 28px;
            width: 100%; max-width: 400px; text-align: center; border: 1px solid #334155;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        .auth-input {
            width: 100%; padding: 16px; margin: 10px 0; background: #0f172a;
            border: 1px solid #334155; border-radius: 14px; color: #fff; font-family: inherit;
        }
        #main-app-wrapper { display: none; width: 100%; height: 100dvh; flex-direction: column; background: #0f172a; }
    </style>
</head>
<body>

    <!-- СЛОЙ АВТОРИЗАЦИИ -->
    <div id="auth-overlay">
        <div class="auth-card">
            <h2 style="color:#38bdf8; font-weight:900; margin-bottom:25px;">ПДД КР 2026</h2>
            <button onclick="handleGoogleAuth()" style="width:100%; padding:14px; background:#fff; border-radius:12px; font-weight:700; cursor:pointer; border:none; margin-bottom:15px; display:flex; align-items:center; justify-content:center; gap:10px;">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18"> GOOGLE ВХОД
            </button>
            <div style="margin:10px; color:#475569; font-size:10px; font-weight:800;">ИЛИ ПОЧТА</div>
            <input type="email" id="auth-email" class="auth-input" placeholder="Email">
            <input type="password" id="auth-pass" class="auth-input" placeholder="Пароль">
            <button onclick="handleEmailAuth()" style="width:100%; padding:18px; background:#38bdf8; color:#0f172a; border:none; border-radius:14px; font-weight:900; cursor:pointer;">ВОЙТИ / СОЗДАТЬ</button>
            <p id="auth-error" style="color:#f43f5e; font-size:11px; margin-top:15px; font-weight:600;"></p>
        </div>
    </div>

    <!-- КОНТЕЙНЕР ОСНОВНОГО ПРИЛОЖЕНИЯ -->
    <div id="main-app-wrapper">
        <header class="game-header" style="height:60px; background:rgba(30,41,59,0.9); display:flex; justify-content:space-between; align-items:center; padding:0 15px; border-bottom:1px solid #334155; position:sticky; top:0; z-index:1000; backdrop-filter: blur(10px);">
            <div style="display:flex; gap:8px;">
                <a href="#/debug" style="background:#ffcc00; color:#000; padding:8px 15px; border-radius:8px; font-weight:800; text-decoration:none; font-size:12px;">МЕНЮ</a>
                <button onclick="logout()" style="background:#e21b3c; color:#fff; border:none; padding:8px 15px; border-radius:8px; font-weight:800; font-size:12px; cursor:pointer;">ВЫХОД</button>
            </div>
            <div id="user-tag" style="color:#94a3b8; font-size:10px; font-weight:800; text-transform:uppercase;"></div>
            <div id="timer-display" style="color:#38bdf8; font-weight:900; font-size:18px;">25:00</div>
        </header>
        <main id="app"></main>
    </div>

    <!-- 4. ОСНОВНАЯ ЛОГИКА СОГЛАСОВАНИЯ -->
   <script type="module">
    import { initCloudApp } from './assets/cloud-logic.js';

    // 1. СЛУШАТЕЛЬ АВТОРИЗАЦИИ
    window.auth.onAuthStateChanged(user => {
        if (user) {
            // Успешный вход
            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('main-app-wrapper').style.display = 'flex';
            
            // Отображаем имя пользователя (обрезаем до @)
            const name = user.displayName || user.email.split('@')[0];
            document.getElementById('user-tag').innerText = name.toUpperCase();
            
            // Если адрес пустой, перекидываем в меню выбора
            if (!window.location.hash || window.location.hash === '#/') {
                window.location.hash = '#/debug';
            }

            // Инициализируем сохранение ошибок в Firebase
            initCloudApp(user.uid);
            
            // Запускаем постоянный контроль интерфейса
            startGlobalSurgeon();
        } else {
            // Не авторизован
            document.getElementById('auth-overlay').style.display = 'flex';
            document.getElementById('main-app-wrapper').style.display = 'none';
        }
    });

    // 2. ФУНКЦИЯ ГЛОБАЛЬНОГО КОНТРОЛЯ ИНТЕРФЕЙСА (ХИРУРГ)
    function startGlobalSurgeon() {
        // Используем интервал для максимальной надежности против Vue.js re-render
        setInterval(() => {
            
            // А. КРАСИМ ПАГИНАЦИЮ (Цифры 1-20)
            // Ищем элементы списка, которые оригинальный движок уже пометил
            const navItems = document.querySelectorAll('ul#componentContainer li');
            navItems.forEach(li => {
                const btn = li.querySelector('.pagination-item');
                if (btn) {
                    if (li.classList.contains('valid')) {
                        btn.setAttribute('data-res', 'bright'); // Красим в яркий (правильно)
                    } else if (li.classList.contains('invalid')) {
                        btn.setAttribute('data-res', 'dark');   // Красим в темный (ошибка)
                    } else {
                        btn.setAttribute('data-res', 'normal'); // Обычный
                    }
                }
            });

            // Б. ЧИНИМ ЭКРАН РЕЗУЛЬТАТОВ (Разрезаем строку 51500:41)
            const resValues = document.querySelector('.values-group');
            // Если блок есть и мы его еще не "причесали"
            if (resValues && !resValues.querySelector('.res-card-pro')) {
                const rawText = resValues.innerText.replace(/\s/g, ''); // Убираем пробелы
                
                // Регулярка ловит: (Правильные)(Ошибки)(Время 00:00)
                // Пример: 18200:45 -> 18 | 2 | 00:45
                const match = rawText.match(/(\d+)(\d+)(\d{2}:\d{2})/);
                
                if (match) {
                    resValues.innerHTML = `
                        <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; width:100%;">
                            <div class="res-card-pro" style="background:#1e293b; padding:15px; border-radius:14px; text-align:center; border:1px solid #334155;">
                                <div style="font-size:8px; opacity:0.5; text-transform:uppercase; font-weight:800; margin-bottom:5px;">Верно</div>
                                <div style="font-size:22px; font-weight:900; color:#10b981;">${match[1]}</div>
                            </div>
                            <div class="res-card-pro" style="background:#1e293b; padding:15px; border-radius:14px; text-align:center; border:1px solid #334155;">
                                <div style="font-size:8px; opacity:0.5; text-transform:uppercase; font-weight:800; margin-bottom:5px;">Ошибки</div>
                                <div style="font-size:22px; font-weight:900; color:#f43f5e;">${match[2]}</div>
                            </div>
                            <div class="res-card-pro" style="background:#1e293b; padding:15px; border-radius:14px; text-align:center; border:1px solid #334155;">
                                <div style="font-size:8px; opacity:0.5; text-transform:uppercase; font-weight:800; margin-bottom:5px;">Время</div>
                                <div style="font-size:22px; font-weight:900; color:#38bdf8;">${match[3]}</div>
                            </div>
                        </div>
                    `;
                }
            }

            // В. ПРИНУДИТЕЛЬНОЕ СКРЫТИЕ МУСОРА (Селектор языка и полоски)
            const junk = document.querySelectorAll('.language, .stylish_line1, .stylish_line2, .main-line');
            junk.forEach(el => el.style.display = 'none');

            // Г. ФИКС КНОПОК "ЗАКРЫТЬ" И "ПРОСМОТР"
            // Добавляем им наши классы, если движок их пересоздал
            const closeBtn = document.querySelector('.action-close');
            const viewBtn = document.querySelector('.action-result');
            if (closeBtn) closeBtn.innerHTML = 'ЗАКРЫТЬ';
            if (viewBtn) viewBtn.innerHTML = 'АНАЛИЗ ТЕСТА';

        }, 400); // Проверка 2.5 раза в секунду - баланс между скоростью и нагрузкой
    }
</script>
<script type="module" src="./assets/index.js"></script>
</body>
</html>
