<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ПДД КР 2026 | Cloud Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/index.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <style>
        /* Специфичные стили для облачной версии */
        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #46178f; display: flex; align-items: center; justify-content: center;
            z-index: 10000; padding: 20px;
        }
        .auth-card {
            background: white; padding: 30px; border-radius: 24px;
            width: 100%; max-width: 400px; text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .auth-input {
            width: 100%; padding: 15px; margin: 10px 0;
            border: 2px solid #f1f5f9; border-radius: 12px; font-family: 'Montserrat';
        }
        .btn-auth-primary {
            width: 100%; padding: 18px; background: #ffcc00; border: none;
            border-radius: 12px; font-weight: 900; cursor: pointer; transition: 0.2s;
        }
        #main-app-wrapper { display: none; width: 100%; }
        
        /* Фикс верхней навигации - чтобы была всегда под рукой */
        .game-header {
            position: fixed; top: 0; left: 0; width: 100%; height: 60px;
            background: rgba(70, 23, 143, 0.9); backdrop-filter: blur(10px);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 15px; z-index: 9999; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .btn-menu-top {
            background: #ffcc00 !important; color: #111 !important;
            padding: 8px 15px; border-radius: 10px; font-weight: 900;
            font-size: 12px; text-decoration: none; box-shadow: 0 3px 0 #b38f00;
        }
        .user-name-label { color: white; font-size: 10px; font-weight: 800; opacity: 0.6; }

        /* Отступ контента от фиксированной шапки */
        #app { margin-top: 60px !important; }
    </style>
</head>
<body>

    <!-- ЭКРАН ВХОДА -->
    <div id="auth-overlay">
        <div class="auth-card">
            <h2 style="color:#46178f; font-weight:900; margin-bottom:20px;">ПДД КР 2026</h2>
            <button class="test-mode-link" style="background:#f1f5f9!important; width:100%; margin-bottom:10px;" onclick="handleGoogleAuth()">ВОЙТИ ЧЕРЕЗ GOOGLE</button>
            <div style="margin:10px; color:#ccc; font-size:10px;">ИЛИ ПОЧТА</div>
            <input type="email" id="auth-email" class="auth-input" placeholder="Email">
            <input type="password" id="auth-pass" class="auth-input" placeholder="Пароль">
            <button class="btn-auth-primary" onclick="handleEmailAuth()">ВОЙТИ / СОЗДАТЬ</button>
            <p id="auth-error" style="color:red; font-size:10px; margin-top:10px;"></p>
        </div>
    </div>

    <!-- ОСНОВНОЕ ПРИЛОЖЕНИЕ -->
    <div id="main-app-wrapper">
        <header class="game-header">
            <a href="#/debug" class="btn-menu-top">МЕНЮ</a>
            <div class="user-name-label" id="user-label"></div>
            <button class="btn-exit" style="padding: 5px 10px; font-size: 10px;" onclick="logout()">ВЫХОД</button>
        </header>
        <main id="app"></main>
    </div>

    <script>
        // --- КОНФИГУРАЦИЯ FIREBASE (Твои ключи) ---
        const firebaseConfig = {
          apiKey: "AIzaSyCWpx351vaBx5dtNubE2EKI3LHdhO-NDCs",
          authDomain: "pdd-kg-local.firebaseapp.com",
          databaseURL: "https://pdd-kg-local-default-rtdb.firebaseio.com",
          projectId: "pdd-kg-local",
          storageBucket: "pdd-kg-local.firebasestorage.app",
          messagingSenderId: "975775800028",
          appId: "1:975775800028:web:9b036c419cc4d1f082b219",
          measurementId: "G-8QFTP6J4JS"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        window._log = console.log;

        // --- АВТОРИЗАЦИЯ ---
        async function handleEmailAuth() {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            try {
                await auth.signInWithEmailAndPassword(email, pass);
            } catch (e) {
                if (e.code === 'auth/user-not-found') await auth.createUserWithEmailAndPassword(email, pass);
                else document.getElementById('auth-error').innerText = e.message;
            }
        }

        async function handleGoogleAuth() {
            const provider = new firebase.auth.GoogleAuthProvider();
            await auth.signInWithPopup(provider).catch(e => console.log(e));
        }

        function logout() { if(confirm("Выйти?")) auth.signOut().then(() => location.reload()); }

        // --- ГЛАВНЫЙ ЦИКЛ ПРИЛОЖЕНИЯ ---
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('main-app-wrapper').style.display = 'block';
                document.getElementById('user-label').innerText = user.email.split('@')[0].toUpperCase();
                
                // Авто-переход в меню
                if (!window.location.hash || window.location.hash === '#/') window.location.hash = '#/debug';
                
                initIntelligentTracker(user.uid);
            } else {
                document.getElementById('auth-overlay').style.display = 'flex';
                document.getElementById('main-app-wrapper').style.display = 'none';
            }
        });

        // --- УМНЫЙ ТРЕКЕР ОШИБОК (Следит за изменениями на экране) ---
        function initIntelligentTracker(uid) {
            const observer = new MutationObserver(() => {
                // Ищем элемент с классом invalid (красный ответ)
                const wrongAnswer = document.querySelector('.question-item.invalid');
                if (wrongAnswer) {
                    const qText = document.querySelector('.question-title')?.innerText;
                    if (qText) {
                        // Сохраняем в базу, используя Base64 как ключ (чтобы Firebase не ругался на символы)
                        const id = btoa(encodeURIComponent(qText)).replace(/[/+=]/g, "X");
                        db.ref(`users/${uid}/errors/${id}`).set({
                            title: qText,
                            date: new Date().toLocaleString()
                        });
                        console.log("🔥 Ошибка поймана и сохранена!");
                    }
                }
            });

            // Начинаем следить за всем деревом элементов в #app
            observer.observe(document.getElementById('app'), { childList: true, subtree: true });

            // Обработка кнопки "Мои ошибки" в меню
            document.addEventListener('click', (e) => {
                if (e.target.innerText && e.target.innerText.includes('Мои ошибки')) {
                    e.preventDefault();
                    renderMistakes(uid);
                }
            });
        }

        async function renderMistakes(uid) {
            const app = document.querySelector('#app');
            app.innerHTML = '<h2 class="title_main2">ЗАГРУЗКА...</h2>';
            const snap = await db.ref(`users/${uid}/errors`).once('value');
            const data = snap.val();

            if (!data) {
                app.innerHTML = '<div class="div_welcome_page"><h2 class="title_main2">ОШИБОК НЕТ!</h2><button class="button_main" onclick="location.reload()">В МЕНЮ</button></div>';
                return;
            }

            let cards = '';
            Object.values(data).forEach(err => {
                cards += `<div class="question-item" style="background:rgba(255,255,255,0.1)!important; color:white!important; font-size:12px; margin-bottom:10px; border-radius:12px; padding:15px; text-align:left; border:1px solid rgba(255,255,255,0.1)!important;">${err.title}</div>`;
            });

            app.innerHTML = `
                <div class="div_welcome_page" style="padding-top:20px;">
                    <h2 class="title_main2">ТВОИ ОШИБКИ (${Object.keys(data).length})</h2>
                    <div class="question-content" style="width:100%; overflow-y:auto; max-height:60vh;">${cards}</div>
                    <button class="button_main" onclick="location.reload()" style="position:static; margin-top:20px; background:#ffcc00!important; color:#111!important;">ВЕРНУТЬСЯ</button>
                </div>`;
        }
    </script>
    <script type="module" src="./assets/index.js"></script>
</body>
</html>
