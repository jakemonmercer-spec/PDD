<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ПДД КР 2026 | Cloud Edition</title>
    
    <!-- Стили -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/index.css">

    <!-- 1. ПОДГОТОВКА ГЛОБАЛЬНОЙ СРЕДЫ (Выполняется мгновенно) -->
    <script>
        window._log = console.log; // Нужно для движка index.js
        window.firebaseInitialized = false;
    </script>

    <!-- 2. ЗАГРУЗКА БИБЛИОТЕК FIREBASE -->
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <!-- 3. ИНИЦИАЛИЗАЦИЯ И ГЛОБАЛЬНЫЕ ФУНКЦИИ -->
    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyCWpx351vaBx5dtNubE2EKI3LHdhO-NDCs",
          authDomain: "pdd-kg-local.firebaseapp.com",
          databaseURL: "https://pdd-kg-local-default-rtdb.firebaseio.com",
          projectId: "pdd-kg-local",
          storageBucket: "pdd-kg-local.firebasestorage.app",
          messagingSenderId: "975775800028",
          appId: "1:975775800028:web:9b036c419cc4d1f082b219"
        };

        // Инициализируем Firebase один раз на самом верхнем уровне
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
            window.db = firebase.database();
            window.auth = firebase.auth();
            window.firebaseInitialized = true;
        }

        // Глобальные функции для кнопок (onclick)
        window.handleEmailAuth = async () => {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            const errBox = document.getElementById('auth-error');
            if(!email || !pass) return;
            try {
                await window.auth.signInWithEmailAndPassword(email, pass);
            } catch (e) {
                if (e.code === 'auth/user-not-found') {
                    await window.auth.createUserWithEmailAndPassword(email, pass);
                } else { errBox.innerText = e.message; }
            }
        };

        window.handleGoogleAuth = async () => {
            const provider = new firebase.auth.GoogleAuthProvider();
            try { await window.auth.signInWithPopup(provider); } catch(e) { console.error(e); }
        };

        window.logout = () => { if(confirm("Выйти?")) window.auth.signOut().then(() => location.reload()); };
    </script>
</head>
<body>

    <!-- ИНТЕРФЕЙС АВТОРИЗАЦИИ -->
    <div id="auth-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#0f172a; display:flex; align-items:center; justify-content:center; z-index:10000; padding:20px;">
        <div class="auth-card" style="background:#1e293b; padding:30px; border-radius:24px; width:100%; max-width:380px; text-align:center; border:1px solid #334155; box-shadow: 0 20px 50px rgba(0,0,0,0.5);">
            <h2 style="color:#38bdf8; margin-bottom:20px; font-weight:900;">ПДД КР 2026</h2>
            <button class="test-mode-link" style="background:#fff!important; color:#000!important; width:100%; margin-bottom:15px; border-radius:12px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; padding:12px;" onclick="handleGoogleAuth()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18"> Google Вход
            </button>
            <div style="margin:15px; color:#475569; font-size:10px; font-weight:800;">ИЛИ ПОЧТА</div>
            <input type="email" id="auth-email" style="width:100%; padding:14px; margin-bottom:10px; background:#0f172a; border:1px solid #334155; border-radius:12px; color:white;" placeholder="Email">
            <input type="password" id="auth-pass" style="width:100%; padding:14px; margin-bottom:15px; background:#0f172a; border:1px solid #334155; border-radius:12px; color:white;" placeholder="Пароль">
            <button style="width:100%; padding:16px; background:#38bdf8; color:#0f172a; border:none; border-radius:12px; font-weight:800; cursor:pointer;" onclick="handleEmailAuth()">ВОЙТИ / СОЗДАТЬ</button>
            <p id="auth-error" style="color:#f43f5e; font-size:11px; margin-top:15px;"></p>
        </div>
    </div>

    <!-- ОСНОВНОЙ КОНТЕНТ ПРИЛОЖЕНИЯ -->
    <div id="main-app-wrapper" style="display:none; flex-direction:column; height:100dvh; width:100%; background:#0f172a;">
        <header class="top-bar">
            <div style="display:flex; gap:8px;">
                <a href="#/debug" class="btn-nav accent">МЕНЮ</a>
                <button class="btn-nav" onclick="logout()">ВЫХОД</button>
            </div>
            <div id="user-display-name" style="color: #94a3b8; font-size: 10px; font-weight: 700; text-transform: uppercase;"></div>
            <div id="timer-display" style="font-weight:900; color:#38bdf8; font-size:16px;">25:00</div>
        </header>
        <main id="app"></main>
    </div>

    <!-- 4. СОГЛАСОВАННАЯ ЛОГИКА ТРЕКЕРА И МОДУЛЕЙ -->
    <script type="module">
        // Импортируем нашу логику
        import { initCloudApp } from './assets/cloud-logic.js';

        // Ждем авторизацию
        window.auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('main-app-wrapper').style.display = 'flex';
                document.getElementById('user-display-name').innerText = user.email.split('@')[0];
                
                if (!window.location.hash || window.location.hash === '#/') {
                    window.location.hash = '#/debug';
                }

                // Инициализируем наш трекер только после успешного входа
                initCloudApp(user.uid);
            } else {
                document.getElementById('auth-overlay').style.display = 'flex';
                document.getElementById('main-app-wrapper').style.display = 'none';
            }
        });
    </script>

    <!-- 5. ДВИЖОК ОРИГИНАЛЬНОГО САЙТА (Загружается последним) -->
    <script type="module" src="./assets/index.js"></script>
</body>
</html>
