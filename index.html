<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ПДД КР 2026 | Cloud Edition</title>
    
    <!-- 1. ПЕРВООЧЕРЕДНЫЕ ГЛОБАЛЬНЫЕ НАСТРОЙКИ -->
    <script>
        window._log = console.log; // Фикс для движка сайта
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/index.css">
    
    <!-- 2. ПОДКЛЮЧЕНИЕ FIREBASE SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <!-- 3. НЕМЕДЛЕННАЯ ИНИЦИАЛИЗАЦИЯ (до загрузки модулей) -->
    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyCWpx351vaBx5dtNubE2EKI3LHdhO-NDCs",
          authDomain: "pdd-kg-local.firebaseapp.com",
          databaseURL: "https://pdd-kg-local-default-rtdb.firebaseio.com",
          projectId: "pdd-kg-local",
          storageBucket: "pdd-kg-local.firebasestorage.app",
          messagingSenderId: "975775800028",
          appId: "1:975775800028:web:9b036c419cc4d1f082b219"
        };

        // Инициализируем глобально, чтобы cloud-logic.js это видел
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        window.auth = firebase.auth();
        window.db = firebase.database();
    </script>

    <style>
        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0f172a; display: flex; align-items: center; justify-content: center;
            z-index: 10000; padding: 20px;
        }
        .auth-card {
            background: #1e293b; padding: 30px; border-radius: 24px;
            width: 100%; max-width: 380px; text-align: center;
            border: 1px solid #334155; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .auth-input {
            width: 100%; padding: 14px; margin: 10px 0; background: #0f172a;
            border: 1px solid #334155; border-radius: 12px; color: #fff; font-family: 'Montserrat';
        }
        .btn-primary {
            width: 100%; padding: 16px; background: #38bdf8; color: #0f172a;
            border: none; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.2s;
        }
        .btn-primary:active { transform: scale(0.98); }
        .btn-google {
            width: 100%; padding: 12px; background: #fff; color: #000;
            border-radius: 12px; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 15px;
        }
        #main-app-wrapper { display: none; flex-direction: column; height: 100dvh; width: 100%; background: #0f172a; }
        .top-bar { flex-shrink: 0; height: 60px; background: #1e293b; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; z-index: 1000; }
        .btn-nav { background: #334155; border: none; padding: 8px 14px; border-radius: 10px; font-size: 12px; font-weight: 800; color: #fff; text-decoration: none; cursor: pointer; }
        .btn-nav.accent { background: #38bdf8; color: #0f172a; }
        #app { flex-grow: 1; overflow-y: auto; padding: 15px; width: 100%; max-width: 600px; margin: 0 auto; scrollbar-width: none; }
        #app::-webkit-scrollbar { display: none; }
        .user-label { color: #94a3b8; font-size: 10px; font-weight: 700; text-transform: uppercase; }
    </style>
</head>
<body>

    <!-- ЭКРАН АВТОРИЗАЦИИ -->
    <div id="auth-overlay">
        <div class="auth-card">
            <h2 style="color:#38bdf8; margin-bottom:20px; font-weight:900;">ПДД КР 2026</h2>
            
            <button class="btn-google" onclick="handleGoogleAuth()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">
                Вход через Google
            </button>

            <div style="margin:15px; color:#475569; font-size:10px; font-weight:800;">ИЛИ ПОЧТА</div>

            <input type="email" id="auth-email" class="auth-input" placeholder="Email">
            <input type="password" id="auth-pass" class="auth-input" placeholder="Пароль">
            
            <button class="btn-primary" onclick="handleEmailAuth()">ВОЙТИ / СОЗДАТЬ</button>
            <p id="auth-error" style="color:#f43f5e; font-size:11px; margin-top:15px; font-weight:600;"></p>
        </div>
    </div>

    <!-- ОСНОВНОЙ КОНТЕНТ -->
    <div id="main-app-wrapper">
        <header class="top-bar">
            <div style="display:flex; gap:8px; align-items:center;">
                <a href="#/debug" class="btn-nav accent">МЕНЮ</a>
                <button class="btn-nav" onclick="logout()">ВЫХОД</button>
            </div>
            <div class="user-label" id="user-display-name"></div>
            <div id="timer-display" style="font-weight:900; color:#38bdf8; font-size:16px;">25:00</div>
        </header>
        
        <main id="app"></main>
    </div>

    <!-- ЛОГИКА ПРИЛОЖЕНИЯ -->
    <script type="module">
        import { initCloudApp } from './assets/cloud-logic.js';

        // Делаем функции глобальными, чтобы onclick в HTML их видел
        window.handleEmailAuth = async () => {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            const errBox = document.getElementById('auth-error');
            try {
                await window.auth.signInWithEmailAndPassword(email, pass);
            } catch (e) {
                if (e.code === 'auth/user-not-found' || e.code === 'auth/wrong-password') {
                    try {
                        await window.auth.createUserWithEmailAndPassword(email, pass);
                    } catch (regErr) { errBox.innerText = regErr.message; }
                } else { errBox.innerText = e.message; }
            }
        };

        window.handleGoogleAuth = async () => {
            const provider = new firebase.auth.GoogleAuthProvider();
            try { await window.auth.signInWithPopup(provider); } catch(e) { console.error(e); }
        };

        window.logout = () => {
            if(confirm("Выйти из аккаунта?")) window.auth.signOut().then(() => location.reload());
        };

        // Слушатель состояния входа
        window.auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('main-app-wrapper').style.display = 'flex';
                document.getElementById('user-display-name').innerText = user.email.split('@')[0];
                
                if (!window.location.hash || window.location.hash === '#/') {
                    window.location.hash = '#/debug';
                }

                // Запуск логики из cloud-logic.js
                initCloudApp(user.uid);
            } else {
                document.getElementById('auth-overlay').style.display = 'flex';
                document.getElementById('main-app-wrapper').style.display = 'none';
            }
        });
    </script>

    <!-- Подключаем основной движок сайта в самом конце -->
    <script type="module" src="./assets/index.js"></script>
</body>
</html>
