<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ПДД Марафон 2026 | Cloud</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/index.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <style>
        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #46178f; display: flex; align-items: center; justify-content: center;
            z-index: 10000; padding: 20px;
        }
        .auth-card {
            background: white; padding: 30px; border-radius: 24px;
            width: 100%; max-width: 400px; text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .auth-card h2 { color: #46178f; font-weight: 900; margin-bottom: 20px; }
        .auth-input {
            width: 100%; padding: 16px; margin: 10px 0;
            border: 2px solid #f1f5f9; border-radius: 14px;
            font-family: 'Montserrat', sans-serif; font-weight: 600;
        }
        .btn-auth-primary {
            width: 100%; padding: 18px; background: #ffcc00; border: none;
            border-radius: 14px; font-weight: 900; cursor: pointer; color: #111;
        }
        .btn-google {
            width: 100%; padding: 14px; background: white; border: 2px solid #f1f5f9;
            border-radius: 14px; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 15px;
        }
        #main-app-wrapper { display: none; width: 100%; }
        
        /* Фикс верхней навигации */
        .game-nav {
            display: flex !important;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.3);
            padding: 10px 15px;
            position: sticky;
            top: 0;
            z-index: 999;
            backdrop-filter: blur(10px);
        }
        .nav-group { display: flex; gap: 8px; align-items: center; }
        .btn-nav {
            background: #e21b3c; color: white; border: none;
            padding: 8px 15px; border-radius: 10px; font-weight: 900;
            font-size: 11px; cursor: pointer; text-decoration: none;
        }
        .btn-home { background: #ffcc00; color: #111; }
        .user-info-tag { color: white; font-size: 10px; font-weight: 700; opacity: 0.8; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-card">
            <h2>ПДД КР 2026</h2>
            <button class="btn-google" onclick="handleGoogleAuth()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
                ВОЙТИ ЧЕРЕЗ GOOGLE
            </button>
            <div style="margin: 15px 0; color: #cbd5e1; font-size: 0.7rem; font-weight: 800;">ИЛИ ПОЧТА</div>
            <input type="email" id="auth-email" class="auth-input" placeholder="Email">
            <input type="password" id="auth-pass" class="auth-input" placeholder="Пароль">
            <button class="btn-auth-primary" onclick="handleEmailAuth()">ВОЙТИ / СОЗДАТЬ</button>
            <p id="auth-error" style="color: #ef4444; margin-top: 15px; font-size: 0.8rem; font-weight: 600;"></p>
        </div>
    </div>

    <div id="main-app-wrapper">
        <nav class="game-nav">
            <div class="nav-group">
                <a href="#/debug" class="btn-nav btn-home">МЕНЮ</a>
                <button class="btn-nav" onclick="logout()">ВЫХОД</button>
            </div>
            <div class="user-info-tag" id="user-label"></div>
            <div id="timer-display" class="header-time">25:00</div>
        </nav>
        <main id="app"></main>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyCWpx351vaBx5dtNubE2EKI3LHdhO-NDCs",
          authDomain: "pdd-kg-local.firebaseapp.com",
          databaseURL: "https://pdd-kg-local-default-rtdb.firebaseio.com",
          projectId: "pdd-kg-local",
          storageBucket: "pdd-kg-local.firebasestorage.app",
          messagingSenderId: "975775800028",
          appId: "1:975775800028:web:9b036c419cc4d1f082b219",
          measurementId: "G-8QFTP6J4JS"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        window._log = console.log;

        async function handleEmailAuth() {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            try {
                await auth.signInWithEmailAndPassword(email, pass);
            } catch (e) {
                if (e.code === 'auth/user-not-found') await auth.createUserWithEmailAndPassword(email, pass);
                else document.getElementById('auth-error').innerText = e.message;
            }
        }

        async function handleGoogleAuth() {
            const provider = new firebase.auth.GoogleAuthProvider();
            try { await auth.signInWithPopup(provider); } catch (e) { console.error(e); }
        }

        function logout() { if(confirm("Выйти?")) auth.signOut().then(() => location.reload()); }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('main-app-wrapper').style.display = 'block';
                document.getElementById('user-label').innerText = user.email.split('@')[0];
                if (!window.location.hash || window.location.hash === '#/') window.location.hash = '#/debug';
                startTracker(user.uid);
            } else {
                document.getElementById('auth-overlay').style.display = 'flex';
                document.getElementById('main-app-wrapper').style.display = 'none';
            }
        });

        // --- УЛУЧШЕННЫЙ ТРЕКЕР ОШИБОК ---
        function startTracker(uid) {
            document.addEventListener('click', (e) => {
                // Если кликнули на любой вариант ответа или кнопку "Ответить"
                const isAction = e.target.closest('.question-item') || e.target.closest('.answer-btn');
                
                if (isAction) {
                    // Даем движку время на отрисовку результата
                    setTimeout(() => {
                        const invalidItem = document.querySelector('.question-item.invalid');
                        if (invalidItem) {
                            const qText = document.querySelector('.question-title')?.innerText;
                            if (qText) {
                                // Генерируем ключ, который точно поймет Firebase (без спецсимволов)
                                const safeKey = btoa(encodeURIComponent(qText)).replace(/[/+=]/g, "X");
                                db.ref(`users/${uid}/errors/${safeKey}`).set({
                                    title: qText,
                                    date: new Date().toLocaleString()
                                });
                                console.log("Ошибка записана в облако!");
                            }
                        }
                    }, 600);
                }

                // Перехват кнопки "Мои ошибки"
                if (e.target.innerText && e.target.innerText.includes('Мои ошибки')) {
                    e.preventDefault();
                    showMistakes(uid);
                }
            });
        }

        async function showMistakes(uid) {
            const app = document.querySelector('#app');
            app.innerHTML = '<div class="question-title">Загрузка...</div>';
            const snap = await db.ref(`users/${uid}/errors`).once('value');
            const data = snap.val();

            if (!data) {
                app.innerHTML = '<div class="div_welcome_page"><h2 class="title_main2">ОШИБОК НЕТ!</h2><button class="button_main" onclick="location.reload()">НАЗАД</button></div>';
                return;
            }

            let list = '';
            Object.values(data).forEach(err => {
                list += `<div class="question-item" style="background:var(--glass)!important; color:white!important; text-align:left; font-size:0.8rem; margin-bottom:8px;">${err.title}</div>`;
            });

            app.innerHTML = `
                <div class="div_welcome_page" style="padding-top:20px;">
                    <h2 class="title_main2" style="color:#ffcc00">МОИ ОШИБКИ</h2>
                    <div class="question-content" style="width:100%; overflow-y:auto; max-height:60vh;">${list}</div>
                    <button class="button_main" onclick="location.reload()" style="position:static; margin-top:20px;">В МЕНЮ</button>
                </div>`;
        }
    </script>
    <script type="module" src="./assets/index.js"></script>
</body>
</html>
