<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ПДД Марафон 2026 | Cloud Edition</title>
    
    <!-- Шрифты и стили -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/index.css">
    
    <!-- Firebase SDK (библиотеки) -->
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <style>
        /* Стили для экрана авторизации */
        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #46178f; display: flex; align-items: center; justify-content: center;
            z-index: 10000; padding: 20px;
        }
        .auth-card {
            background: white; padding: clamp(20px, 5vw, 40px); border-radius: 24px;
            width: 100%; max-width: 400px; text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .auth-card h2 { color: #46178f; font-weight: 900; margin-bottom: 20px; font-size: 1.5rem; }
        .auth-input {
            width: 100%; padding: 16px; margin: 10px 0;
            border: 2px solid #f1f5f9; border-radius: 14px;
            font-family: 'Montserrat', sans-serif; font-weight: 600; font-size: 1rem;
        }
        .btn-auth-primary {
            width: 100%; padding: 18px; background: #ffcc00; border: none;
            border-radius: 14px; font-weight: 900; font-size: 1.1rem;
            cursor: pointer; margin-top: 10px; color: #111; transition: 0.2s;
            box-shadow: 0 4px 0 #b38f00;
        }
        .btn-auth-primary:active { transform: translateY(2px); box-shadow: 0 2px 0 #b38f00; }
        
        .btn-google {
            width: 100%; padding: 14px; background: white; border: 2px solid #f1f5f9;
            border-radius: 14px; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            margin-bottom: 15px; transition: 0.2s;
        }
        .btn-google:hover { background: #f8fafc; }
        .auth-toggle { margin-top: 15px; color: #64748b; cursor: pointer; font-weight: 600; font-size: 0.9rem; }
        
        /* Скрытие основного приложения до входа */
        #main-app-wrapper { display: none; }
        
        .user-pill {
            background: rgba(255,255,255,0.1); padding: 5px 12px;
            border-radius: 20px; font-size: 0.7rem; font-weight: 700;
            max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
    </style>
</head>
<body>

    <!-- 1. ЭКРАН ВХОДА -->
    <div id="auth-overlay">
        <div class="auth-card">
            <h2 id="auth-title">ПДД КР 2026</h2>
            
            <button class="btn-google" onclick="handleGoogleAuth()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
                ВОЙТИ ЧЕРЕЗ GOOGLE
            </button>

            <div style="margin: 15px 0; color: #cbd5e1; font-size: 0.7rem; font-weight: 800; text-transform: uppercase;">ИЛИ ПОЧТА</div>

            <input type="email" id="auth-email" class="auth-input" placeholder="Email">
            <input type="password" id="auth-pass" class="auth-input" placeholder="Пароль">
            
            <button id="auth-main-btn" class="btn-auth-primary" onclick="handleEmailAuth()">ВОЙТИ</button>
            
            <div id="auth-mode-toggle" class="auth-toggle" onclick="toggleAuthMode()">
                Нет аккаунта? Регистрация
            </div>
            
            <p id="auth-error" style="color: #ef4444; margin-top: 15px; font-size: 0.8rem; font-weight: 600;"></p>
        </div>
    </div>

    <!-- 2. ОСНОВНОЕ ПРИЛОЖЕНИЕ -->
    <div id="main-app-wrapper">
        <div id="app-viewport">
            <nav class="game-nav" style="display: flex !important; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.2); padding: 10px;">
                <button class="btn-exit" onclick="logout()" style="background: #e21b3c; border:none; color:white; padding: 8px 15px; border-radius: 10px; font-weight: 900; font-size: 12px; cursor:pointer;">ВЫХОД</button>
                <div class="user-pill" id="user-email-label">Загрузка...</div>
                <div id="timer-display" class="header-time">25:00</div>
            </nav>
            <main id="app"></main>
        </div>
    </div>

    <script>
        // --- ТВОЯ КОНФИГУРАЦИЯ FIREBASE ---
        const firebaseConfig = {
          apiKey: "AIzaSyCWpx351vaBx5dtNubE2EKI3LHdhO-NDCs",
          authDomain: "pdd-kg-local.firebaseapp.com",
          databaseURL: "https://pdd-kg-local-default-rtdb.firebaseio.com",
          projectId: "pdd-kg-local",
          storageBucket: "pdd-kg-local.firebasestorage.app",
          messagingSenderId: "975775800028",
          appId: "1:975775800028:web:9b036c419cc4d1f082b219",
          measurementId: "G-8QFTP6J4JS"
        };

        // Инициализация
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        
        window._log = console.log; // Фикс для работы движка
        let isLoginMode = true;

        // --- ЛОГИКА АВТОРИЗАЦИИ ---
        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? 'ПДД КР 2026' : 'РЕГИСТРАЦИЯ';
            document.getElementById('auth-main-btn').innerText = isLoginMode ? 'ВОЙТИ' : 'СОЗДАТЬ АККАУНТ';
            document.getElementById('auth-mode-toggle').innerText = isLoginMode ? 'Нет аккаунта? Регистрация' : 'Уже есть аккаунт? Войти';
        }

        async function handleEmailAuth() {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            const errBox = document.getElementById('auth-error');
            if(!email || !pass) { errBox.innerText = "Заполните поля"; return; }
            try {
                if (isLoginMode) await auth.signInWithEmailAndPassword(email, pass);
                else await auth.createUserWithEmailAndPassword(email, pass);
            } catch (e) { errBox.innerText = e.message; }
        }

        async function handleGoogleAuth() {
            const provider = new firebase.auth.GoogleAuthProvider();
            try { await auth.signInWithPopup(provider); } 
            catch (e) { document.getElementById('auth-error').innerText = e.message; }
        }

        function logout() {
            if(confirm("Выйти из аккаунта?")) auth.signOut().then(() => location.reload());
        }

        // --- СЛУШАТЕЛЬ СОСТОЯНИЯ ВХОДА ---
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('main-app-wrapper').style.display = 'block';
                document.getElementById('user-email-label').innerText = user.displayName || user.email;
                startAppAnalytics(user.uid);
            } else {
                document.getElementById('auth-overlay').style.display = 'flex';
                document.getElementById('main-app-wrapper').style.display = 'none';
            }
        });

        // --- ЛОГИКА ТРЕКИНГА ОШИБОК ---
        function startAppAnalytics(uid) {
            function logMistake(title) {
                // Создаем чистый ID из названия вопроса
                const safeId = btoa(unescape(encodeURIComponent(title))).replace(/[/+=]/g, "");
                db.ref(`users/${uid}/errors/${safeId}`).set({
                    title: title,
                    date: new Date().toISOString()
                });
                console.log("Ошибка сохранена в облако");
            }

            document.addEventListener('click', (e) => {
                // Ловим кнопку "Ответить"
                if (e.target.closest('.answer-btn')) {
                    setTimeout(() => {
                        const hasError = document.querySelector('.question-item.invalid');
                        if (hasError) {
                            const qText = document.querySelector('.question-title')?.innerText;
                            if (qText) logMistake(qText);
                        }
                    }, 600);
                }

                // Ловим кнопку "Мои ошибки" в твоем меню
                if (e.target.innerText && e.target.innerText.includes('Мои ошибки')) {
                    e.preventDefault();
                    renderMistakesScreen(uid);
                }
            });
        }

        // --- ЭКРАН "МОИ ОШИБКИ" (Вытягиваем из Firebase) ---
        async function renderMistakesScreen(uid) {
            const app = document.querySelector('#app');
            app.innerHTML = '<div class="question-title">Ищу твои ошибки в облаке...</div>';
            
            const snapshot = await db.ref(`users/${uid}/errors`).once('value');
            const data = snapshot.val();

            if (!data) {
                app.innerHTML = `
                    <div class="div_welcome_page">
                        <div class="title_main2" style="color:#ffcc00">ОШИБОК НЕТ!</div>
                        <div class="question-title" style="background:none; color:white;">Ты всё выучил. Красавчик!</div>
                        <button class="button_main" onclick="location.reload()">НАЗАД В МЕНЮ</button>
                    </div>`;
                return;
            }

            let listHtml = '';
            for (let id in data) {
                listHtml += `<div class="question-item" style="background:rgba(255,255,255,0.1) !important; border:1px solid rgba(255,255,255,0.2) !important; color:white !important; text-align:left; font-size:0.85rem; padding:15px; margin-bottom:8px; border-radius:12px;">${data[id].title}</div>`;
            }

            app.innerHTML = `
                <div class="div_welcome_page">
                    <div class="title_main2" style="color:#ffcc00">ТВОИ ОШИБКИ (${Object.keys(data).length})</div>
                    <div class="question-content" style="width:100%; margin-bottom:100px;">${listHtml}</div>
                    <button class="button_main" onclick="location.reload()" style="position:fixed; bottom:20px; left:50%; transform:translateX(-50%); width:calc(100% - 40px); max-width:600px;">ВЕРНУТЬСЯ</button>
                </div>`;
        }
    </script>

    <!-- Подключаем основной движок сайта -->
    <script type="module" src="./assets/index.js"></script>
</body>
</html>
