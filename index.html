<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ПДД КР 2026 | Работа над ошибками</title>
    <link rel="stylesheet" href="./assets/index.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <style>
        /* Дополнительные стили для тренажера ошибок */
        .mistake-badge {
            background: var(--danger);
            color: white;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 10px;
            margin-left: 10px;
        }
        .trainer-container {
            width: 100%;
            animation: fadeIn 0.3s ease;
        }
        .progress-mini {
            width: 100%;
            height: 4px;
            background: var(--border);
            margin-bottom: 20px;
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: var(--primary);
            transition: width 0.3s ease;
        }
        .explanation-box {
            background: var(--surface-light);
            padding: 15px;
            border-radius: 12px;
            margin-top: 15px;
            border-left: 4px solid var(--primary);
            font-size: 13px;
        }
    </style>
</head>
<body>

    <!-- ЭКРАН ВХОДА -->
    <div id="auth-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#0f172a; display:flex; align-items:center; justify-content:center; z-index:10000;">
        <div class="auth-card" style="background:#1e293b; padding:30px; border-radius:24px; width:90%; max-width:360px; text-align:center; border:1px solid #334155;">
            <h2 style="color:#38bdf8; margin-bottom:20px; font-weight:800;">ПДД КР 2026</h2>
            <button class="btn-google" onclick="handleGoogleAuth()" style="width:100%; padding:12px; border-radius:12px; border:none; cursor:pointer; font-weight:600; display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:15px;">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18"> Вход Google
            </button>
            <input type="email" id="auth-email" class="auth-input" placeholder="Email" style="width:100%; padding:12px; margin-bottom:10px; border-radius:10px; border:1px solid #334155; background:#0f172a; color:white;">
            <input type="password" id="auth-pass" class="auth-input" placeholder="Пароль" style="width:100%; padding:12px; margin-bottom:15px; border-radius:10px; border:1px solid #334155; background:#0f172a; color:white;">
            <button class="btn-primary" onclick="handleEmailAuth()" style="width:100%; padding:14px; background:#38bdf8; border:none; border-radius:12px; font-weight:800; color:#0f172a;">Войти</button>
        </div>
    </div>

    <!-- ОСНОВНОЕ ПРИЛОЖЕНИЕ -->
    <div id="main-app-wrapper" style="display:none; flex-direction:column; height:100dvh; background:#0f172a;">
        <header class="top-bar">
            <div style="display:flex; gap:8px;">
                <a href="#/debug" id="home-btn" class="btn-nav accent">МЕНЮ</a>
                <button class="btn-nav" onclick="logout()">ВЫХОД</button>
            </div>
            <div id="timer-display" style="font-weight:900; color:#38bdf8; font-size:16px;">25:00</div>
        </header>
        <main id="app"></main>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyCWpx351vaBx5dtNubE2EKI3LHdhO-NDCs",
          authDomain: "pdd-kg-local.firebaseapp.com",
          databaseURL: "https://pdd-kg-local-default-rtdb.firebaseio.com",
          projectId: "pdd-kg-local",
          storageBucket: "pdd-kg-local.firebasestorage.app",
          messagingSenderId: "975775800028",
          appId: "1:975775800028:web:9b036c419cc4d1f082b219"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        window._log = console.log;

        let mainDatabase = null; // Тут будут все 800 вопросов
        let currentMistakeIndex = 0;
        let userMistakesKeys = [];

        // Хеш для ID вопроса
        function generateId(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = ((hash << 5) - hash) + str.charCodeAt(i);
                hash |= 0;
            }
            return 'q' + Math.abs(hash);
        }

        async function handleEmailAuth() {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            try { await auth.signInWithEmailAndPassword(email, pass); } 
            catch (e) { if (e.code === 'auth/user-not-found') await auth.createUserWithEmailAndPassword(email, pass); }
        }

        async function handleGoogleAuth() {
            try { await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); } catch(e) {}
        }

        function logout() { auth.signOut().then(() => location.reload()); }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('main-app-wrapper').style.display = 'flex';
                if (!window.location.hash || window.location.hash === '#/') window.location.hash = '#/debug';
                initApp(user.uid);
            }
        });

        async function initApp(uid) {
            // Загружаем основную базу вопросов один раз
            const resp = await fetch('./data/data.json');
            mainDatabase = await resp.json();

            const observer = new MutationObserver(() => {
                // Красим цифры внизу
                document.querySelectorAll('ul#componentContainer li').forEach(li => {
                    const btn = li.querySelector('.pagination-item');
                    if (btn) {
                        if (li.className.includes('valid')) btn.classList.add('is-correct');
                        if (li.className.includes('invalid')) btn.classList.add('is-wrong');
                    }
                });

                // Ловим ошибки в реальном времени
                const wrong = document.querySelector('.question-item.invalid');
                if (wrong) {
                    const qText = document.querySelector('.question-title')?.innerText;
                    if (qText) {
                        const qId = generateId(qText);
                        db.ref(`users/${uid}/errors/${qId}`).set({ title: qText, date: new Date().toLocaleString() });
                    }
                }
            });

            observer.observe(document.getElementById('app'), { childList: true, subtree: true, attributes: true });

            document.addEventListener('click', (e) => {
                if (e.target.innerText && e.target.innerText.includes('Мои ошибки')) {
                    e.preventDefault();
                    startMistakeTrainer(uid);
                }
            });
        }

        // --- ТРЕНАЖЕР ОШИБОК ---
        async function startMistakeTrainer(uid) {
            const app = document.querySelector('#app');
            app.innerHTML = '<div style="text-align:center; padding:50px;">Загружаем работу над ошибками...</div>';
            
            const snap = await db.ref(`users/${uid}/errors`).once('value');
            const mistakesData = snap.val();

            if (!mistakesData) {
                app.innerHTML = '<div style="text-align:center; padding:50px;"><h2>У вас нет накопленных ошибок!</h2><button class="button_main" onclick="location.reload()">Назад</button></div>';
                return;
            }

            userMistakesKeys = Object.keys(mistakesData);
            currentMistakeIndex = 0;
            renderMistakeQuestion(uid);
        }

        function renderMistakeQuestion(uid) {
            const app = document.querySelector('#app');
            const qKey = userMistakesKeys[currentMistakeIndex];
            const qTitle = prompt; // Placeholder

            // Ищем данные вопроса в основной базе
            const questionData = mainDatabase.questions.find(q => generateId(q.title) === qKey);

            if (!questionData) {
                // Если не нашли (бывает при смене версий), просто идем дальше
                nextMistake(uid);
                return;
            }

            const progress = ((currentMistakeIndex + 1) / userMistakesKeys.length) * 100;

            app.innerHTML = `
                <div class="trainer-container">
                    <div class="progress-mini"><div class="progress-fill" style="width: ${progress}%"></div></div>
                    <div style="font-size:12px; color:var(--text-muted); margin-bottom:10px;">Вопрос ${currentMistakeIndex + 1} из ${userMistakesKeys.length}</div>
                    
                    <img src="./data/images/${questionData.image}" class="main-img" onerror="this.style.display='none'">
                    <div class="question-title">${questionData.title}</div>
                    
                    <div class="question-content">
                        ${questionData.answers.map((ans, idx) => `
                            <div class="question-item mistake-ans" data-idx="${idx}">
                                ${ans.title}
                            </div>
                        `).join('')}
                    </div>

                    <div id="trainer-feedback"></div>
                    <button id="trainer-next-btn" class="button_main" style="display:none">СЛЕДУЮЩИЙ</button>
                </div>
            `;

            // Обработка выбора
            document.querySelectorAll('.mistake-ans').forEach(item => {
                item.onclick = function() {
                    const idx = parseInt(this.dataset.idx);
                    const isCorrect = (idx + 1) === questionData.correct;
                    
                    document.querySelectorAll('.mistake-ans').forEach(el => el.style.pointerEvents = 'none');

                    if (isCorrect) {
                        this.classList.add('valid');
                        document.getElementById('trainer-feedback').innerHTML = `
                            <div class="explanation-box" style="border-color:var(--success)">
                                <b>Правильно!</b><br>Этот вопрос будет удален из списка ошибок, если вы этого хотите.
                            </div>
                        `;
                        // Удаляем из Firebase, так как ответили верно
                        db.ref(`users/${uid}/errors/${qKey}`).remove();
                    } else {
                        this.classList.add('invalid');
                        const correctEl = document.querySelector(`.mistake-ans[data-idx="${questionData.correct - 1}"]`);
                        if (correctEl) correctEl.classList.add('valid');
                        
                        document.getElementById('trainer-feedback').innerHTML = `
                            <div class="explanation-box">
                                <b>Ошибка!</b><br>${questionData.explanation || 'Повторите правила ПДД.'}
                            </div>
                        `;
                    }
                    document.getElementById('trainer-next-btn').style.display = 'block';
                };
            });

            document.getElementById('trainer-next-btn').onclick = () => nextMistake(uid);
        }

        function nextMistake(uid) {
            currentMistakeIndex++;
            if (currentMistakeIndex < userMistakesKeys.length) {
                renderMistakeQuestion(uid);
            } else {
                document.querySelector('#app').innerHTML = `
                    <div style="text-align:center; padding:50px;">
                        <h2>Тренировка окончена!</h2>
                        <p>Вы просмотрели все свои ошибки.</p><br>
                        <button class="button_main" onclick="location.reload()">В МЕНЮ</button>
                    </div>
                `;
            }
        }
    </script>
    <script type="module" src="./assets/index.js"></script>
</body>
</html>
