<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ПДД КР 2026 | Cloud</title>
    
    <script>window._log = console.log;</script>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/index.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyCWpx351vaBx5dtNubE2EKI3LHdhO-NDCs",
          authDomain: "pdd-kg-local.firebaseapp.com",
          databaseURL: "https://pdd-kg-local-default-rtdb.firebaseio.com",
          projectId: "pdd-kg-local",
          storageBucket: "pdd-kg-local.firebasestorage.app",
          messagingSenderId: "975775800028",
          appId: "1:975775800028:web:9b036c419cc4d1f082b219"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        window.auth = firebase.auth();
        window.db = firebase.database();
    </script>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-card">
            <h2>ПДД КР 2026</h2>
            <button class="btn-google-login" onclick="handleGoogleAuth()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18"> Google Вход
            </button>
            <div class="separator">ИЛИ ПОЧТА</div>
            <input type="email" id="auth-email" class="auth-input" placeholder="Email">
            <input type="password" id="auth-pass" class="auth-input" placeholder="Пароль">
            <button class="btn-primary-auth" onclick="handleEmailAuth()">ВОЙТИ / СОЗДАТЬ</button>
            <p id="auth-error"></p>
        </div>
    </div>

    <div id="main-app-wrapper">
        <header class="app-header">
            <div class="nav-left">
                <a href="#/debug" class="btn-header home">МЕНЮ</a>
                <button class="btn-header" onclick="logout()">ВЫХОД</button>
            </div>
            <div id="user-display"></div>
            <div id="timer-display">25:00</div>
        </header>
        <main id="app"></main>
    </div>

    <script type="module">
        import { initCloudApp } from './assets/cloud-logic.js';

        window.handleEmailAuth = async () => {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            try { await window.auth.signInWithEmailAndPassword(email, pass); } 
            catch (e) { if (e.code.includes('not-found')) await window.auth.createUserWithEmailAndPassword(email, pass); }
        };

        window.handleGoogleAuth = async () => {
            await window.auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
        };

        window.logout = () => { if(confirm("Выйти?")) window.auth.signOut().then(() => location.reload()); };

        window.auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('main-app-wrapper').style.display = 'flex';
                document.getElementById('user-display').innerText = user.email.split('@')[0].toUpperCase();
                if (!window.location.hash || window.location.hash === '#/') window.location.hash = '#/debug';
                initCloudApp(user.uid);
                startUIRepair(); // Запуск "Хирурга"
            }
        });

        // Функция "Хирург" - чинит то, что не может CSS
        function startUIRepair() {
            const observer = new MutationObserver(() => {
                // 1. ЧИНИМ ЦВЕТА ПАГИНАЦИИ (Цифры внизу)
                document.querySelectorAll('ul#componentContainer li').forEach(li => {
                    const btn = li.querySelector('.pagination-item');
                    if (btn) {
                        if (li.classList.contains('valid')) btn.setAttribute('data-state', 'correct');
                        else if (li.classList.contains('invalid')) btn.setAttribute('data-state', 'wrong');
                    }
                });

                // 2. ЧИНИМ ЭКРАН РЕЗУЛЬТАТОВ (Фото 3)
                const resultBlock = document.querySelector('.result');
                if (resultBlock && !resultBlock.classList.contains('repaired')) {
                    const values = resultBlock.querySelector('.values-group');
                    if (values) {
                        const text = values.innerText; // Получаем ту самую строку "1300:44"
                        const match = text.match(/(\d+)(\d+)(\d{2}:\d{2})/);
                        if (match) {
                            values.innerHTML = `
                                <div class="res-item"><span class="label">Правильно</span><span class="val correct">${match[1]}</span></div>
                                <div class="res-item"><span class="label">Ошибки</span><span class="val wrong">${match[2]}</span></div>
                                <div class="res-item"><span class="label">Время</span><span class="val">${match[3]}</span></div>
                            `;
                            resultBlock.classList.add('repaired');
                        }
                    }
                }
            });
            observer.observe(document.getElementById('app'), { childList: true, subtree: true });
        }
    </script>
    <script type="module" src="./assets/index.js"></script>
</body>
</html>
