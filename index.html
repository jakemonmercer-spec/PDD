<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ПДД КР | Оптимизированная версия</title>
    <link rel="stylesheet" href="./assets/index.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <style>
        /* Стили для экрана входа */
        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; display: flex; align-items: center; justify-content: center;
            z-index: 10000; padding: 20px;
        }
        .auth-card {
            background: white; padding: 25px; border-radius: 20px;
            width: 100%; max-width: 340px; text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 1px solid #f1f5f9;
        }
        .auth-input {
            width: 100%; padding: 14px; margin: 8px 0;
            border: 1px solid #e2e8f0; border-radius: 12px; font-size: 16px;
        }
        .btn-auth {
            width: 100%; padding: 14px; background: #2563eb; color: white;
            border: none; border-radius: 12px; font-weight: 700; cursor: pointer;
        }
        .btn-google {
            width: 100%; padding: 12px; background: white; border: 1px solid #e2e8f0;
            border-radius: 12px; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 15px;
        }

        /* Основная оболочка приложения */
        #main-app-wrapper { 
            display: none; 
            flex-direction: column;
            height: 100dvh; /* Высота ровно на весь экран телефона */
            width: 100%;
        }

        /* Шапка всегда сверху */
        .app-header {
            flex-shrink: 0;
            height: 50px;
            background: #fff;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
            z-index: 1000;
        }

        .header-btn {
            background: #f1f5f9; border: none; padding: 6px 12px;
            border-radius: 8px; font-size: 12px; font-weight: 700; color: #475569;
            text-decoration: none;
        }
        .header-btn.blue { background: #2563eb; color: #fff; }

        /* Контейнер для движка теста */
        #app {
            flex-grow: 1;
            overflow-y: auto; /* Позволяет скроллить только вопросы */
            padding: 10px;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }
    </style>
</head>
<body>

    <!-- ЭКРАН ВХОДА -->
    <div id="auth-overlay">
        <div class="auth-card">
            <h2 style="margin-bottom:20px;">ПДД КР</h2>
            <button class="btn-google" onclick="handleGoogleAuth()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">
                Google Вход
            </button>
            <input type="email" id="auth-email" class="auth-input" placeholder="Email">
            <input type="password" id="auth-pass" class="auth-input" placeholder="Пароль">
            <button class="btn-auth" onclick="handleEmailAuth()">Войти</button>
            <p id="auth-error" style="color:red; font-size:11px; margin-top:10px;"></p>
        </div>
    </div>

    <!-- КОНТЕЙНЕР ПРИЛОЖЕНИЯ -->
    <div id="main-app-wrapper">
        <header class="app-header">
            <div style="display:flex; gap:5px;">
                <a href="#/debug" class="header-btn blue">МЕНЮ</a>
                <button class="header-btn" onclick="logout()">ВЫХОД</button>
            </div>
            <div id="timer-display" style="font-weight:800; color:#2563eb; font-size:14px;">25:00</div>
        </header>
        <main id="app"></main>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyCWpx351vaBx5dtNubE2EKI3LHdhO-NDCs",
          authDomain: "pdd-kg-local.firebaseapp.com",
          databaseURL: "https://pdd-kg-local-default-rtdb.firebaseio.com",
          projectId: "pdd-kg-local",
          storageBucket: "pdd-kg-local.firebasestorage.app",
          messagingSenderId: "975775800028",
          appId: "1:975775800028:web:9b036c419cc4d1f082b219"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        window._log = console.log;

        // --- ФУНКЦИИ ХЕШИРОВАНИЯ (для исправления ошибки 768 bytes) ---
        function getSafeId(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = ((hash << 5) - hash) + str.charCodeAt(i);
                hash |= 0;
            }
            return 'q_' + Math.abs(hash);
        }

        async function handleEmailAuth() {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            try { await auth.signInWithEmailAndPassword(email, pass); } 
            catch (e) { if (e.code === 'auth/user-not-found') await auth.createUserWithEmailAndPassword(email, pass); }
        }

        async function handleGoogleAuth() {
            const provider = new firebase.auth.GoogleAuthProvider();
            await auth.signInWithPopup(provider);
        }

        function logout() { auth.signOut().then(() => location.reload()); }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('main-app-wrapper').style.display = 'flex';
                if (!window.location.hash || window.location.hash === '#/') window.location.hash = '#/debug';
                initLogic(user.uid);
            } else {
                document.getElementById('auth-overlay').style.display = 'flex';
                document.getElementById('main-app-wrapper').style.display = 'none';
            }
        });

        function initLogic(uid) {
            const observer = new MutationObserver(() => {
                // 1. ПРОВЕРКА ОШИБОК ДЛЯ FIREBASE
                const wrong = document.querySelector('.question-item.invalid');
                if (wrong) {
                    const qText = document.querySelector('.question-title')?.innerText;
                    if (qText) {
                        const safeId = getSafeId(qText); // Используем короткий хеш вместо Base64
                        db.ref(`users/${uid}/errors/${safeId}`).set({ title: qText, date: new Date().toLocaleString() });
                    }
                }

                // 2. ФИКС ЦВЕТОВ В 20 БЛОКАХ (ПЕРЕНОС КЛАССОВ)
                // Иногда движок красит <li>, а нам нужно красить кнопку внутри
                document.querySelectorAll('ul#componentContainer li').forEach(li => {
                    const btn = li.querySelector('.pagination-item');
                    if (btn) {
                        if (li.classList.contains('valid')) btn.classList.add('valid');
                        if (li.classList.contains('invalid')) btn.classList.add('invalid');
                    }
                });
            });

            observer.observe(document.getElementById('app'), { childList: true, subtree: true, attributes: true, attributeFilter: ['class'] });

            // Обработка кликов
            document.addEventListener('click', (e) => {
                if (e.target.innerText && e.target.innerText.includes('Мои ошибки')) {
                    e.preventDefault();
                    showMistakes(uid);
                }
            });
        }

        async function showMistakes(uid) {
            const app = document.querySelector('#app');
            app.innerHTML = '<div style="padding:40px; text-align:center;">Загрузка...</div>';
            const snap = await db.ref(`users/${uid}/errors`).once('value');
            const data = snap.val();
            if (!data) {
                app.innerHTML = '<div style="padding:40px; text-align:center;">Ошибок нет!<br><br><button class="btn-auth" onclick="location.reload()">Назад</button></div>';
                return;
            }
            let cards = '';
            Object.values(data).forEach(err => {
                cards += `<div class="question-item" style="font-size:13px; margin-bottom:8px; border:1px solid #e2e8f0; padding:12px; border-radius:10px; background:#f8fafc;">${err.title}</div>`;
            });
            app.innerHTML = `<div style="padding-bottom:100px;"><h2>ВАШИ ОШИБКИ</h2>${cards}<button class="btn-auth" onclick="location.reload()" style="position:fixed; bottom:20px; left:20px; width:calc(100% - 40px); max-width:460px;">В МЕНЮ</button></div>`;
        }
    </script>
    <script type="module" src="./assets/index.js"></script>
</body>
</html>
